[account]
is_settings_sync_enabled = false

[agents]
cloud_conversation_storage_enabled = false

[agents.warp_agent.input]
ai_auto_detection_enabled = false

[appearance]
spacing = "compact"
system_theme = true

[appearance.blocks]
show_block_dividers = false

[appearance.input]
input_mode = "pinned_to_top"

[appearance.tabs]
workspace_decoration_visibility = "on_hover"

[appearance.text]
font_name = "Fira Code"
font_size = 16.0
ligature_rendering_enabled = true

[appearance.vertical_tabs]
enabled = true

[code.editor]
open_code_panels_file_editor = "system_default"

[code.indexing]
agent_mode_codebase_context_auto_indexing = true

[general]
link_tooltip = false
quit_on_last_window_closed = true
show_changelog_after_update = false
user_native_preference = "desktop"

[privacy]
telemetry_enabled = false
crash_reporting_enabled = false

[terminal]
use_audible_bell = true

[terminal.input]
alias_expansion_enabled = true
completion_open_while_typing = true

[text_editing]
vim_mode_enabled = true
vim_status_bar = true

[warp_drive]
enabled = false
